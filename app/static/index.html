<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Breathe · Chat</title>

<style>
  * {
  box-sizing: border-box;
}

:root {
  --accent: #6ee7b7;
  --accent-2: #8b5cf6;
  --bg-dark: #0f172a;
  --surface: rgba(255,255,255,0.08);
  --text: #f8fafc;
  --muted: #cbd5e1;
}

/* Animated gradient background */
body {
  margin: 0;
  font-family: "Inter", sans-serif;
  background: linear-gradient(-45deg, #0f172a, #1e293b, #111827, #1e1b4b);
  background-size: 400% 400%;
  animation: gradientMove 15s ease infinite;
  color: white;
  height: 100vh;
  display: flex;
}

@keyframes gradientMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* Floating glow circles */
body::before,
body::after {
  content: "";
  position: absolute;
  width: 400px;
  height: 400px;
  border-radius: 50%;
  filter: blur(120px);
  opacity: 0.3;
  z-index: 0;
}

body::before {
  background: #6ee7b7;
  top: -100px;
  left: -100px;
}

body::after {
  background: #8b5cf6;
  bottom: -100px;
  right: -100px;
}

/* Layout */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
}

.chat-container {
  flex: 1;
  display: flex;
  flex-direction: column;
  max-width: 900px;
  margin: auto;
  width: 100%;
  padding: 20px;
  min-height: 0;
}



/* Messages */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px 0;
  display: flex;
  flex-direction: column;
  gap: 20px;
  scroll-behavior: smooth;
  overscroll-behavior: contain;
}

/* Chat bubbles */
.message {
  max-width: 75%;
  padding: 16px 20px;
  border-radius: 18px;
  line-height: 1.6;
  backdrop-filter: blur(14px);
  background: var(--surface);
  border: 1px solid rgba(255,255,255,0.1);
  animation: pop 0.25s ease;
}

.user {
  align-self: flex-end;
  background: linear-gradient(135deg, #6ee7b7, #3dd9b3);
  color: #0f172a;
}

.bot {
  align-self: flex-start;
}

@keyframes pop {
  from { transform: scale(0.95); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

/* Input */
.input-area {
  margin-top: 10px;
}

.input-wrapper {
  display: flex;
  gap: 12px;
  padding: 14px 18px;
  border-radius: 20px;
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.15);
}

textarea {
  flex: 1;
  background: transparent;
  border: none;
  color: white;
  font-size: 1rem;
  resize: none;
  outline: none;
}

textarea::placeholder {
  color: var(--muted);
}

button {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  border: none;
  background: linear-gradient(135deg, #6ee7b7, #8b5cf6);
  color: white;
  font-size: 1.3rem;
  cursor: pointer;
  transition: 0.2s;
  box-shadow: 0 0 20px rgba(139,92,246,0.5);
}

button:hover {
  transform: scale(1.1);
}

/* Scrollbar */
.messages::-webkit-scrollbar {
  width: 6px;
}
.messages::-webkit-scrollbar-thumb {
  background: rgba(255,255,255,0.3);
  border-radius: 10px;
}

/* Responsive */
@media (max-width: 600px) {
  .message {
    max-width: 95%;
  }
}
</style> 
</head>

<body>

<main class="main">
<div class="chat-container">
<div class="messages" id="messages"></div>

<div class="input-area">
  <div class="input-wrapper">
    <textarea id="input" rows="1" placeholder="Send a message..." maxlength="400"></textarea>
    <button id="send" disabled>↑</button>
  </div>
</div>


</div>
</main>

<script>
const messagesEl = document.getElementById("messages");
const input = document.getElementById("input");
const sendBtn = document.getElementById("send");

function isScrolledNearBottom() {
  return (messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight) < 120;
}

function scrollToBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function addMessage(content, who = "user", emotion = "") {
  const div = document.createElement("div");
  div.className = `message ${who}`;
  div.innerHTML = content.replace(/\n/g, "<br>");

  if (emotion) {
    const em = document.createElement("div");
    em.className = "emotion-tag";
    em.textContent = emotion;
    div.appendChild(em);
  }

  messagesEl.appendChild(div);

  // Always scroll after message
  setTimeout(scrollToBottom, 50);
}

function showTyping() {
  let typing = document.querySelector(".typing");
  if (!typing) {
    typing = document.createElement("div");
    typing.className = "typing";
    typing.innerHTML = `
      <div class="dots">
        <span>.</span><span>.</span><span>.</span>
      </div>
    `;
    messagesEl.appendChild(typing);
  }
  typing.classList.add("show");
  scrollToBottom();
}

function hideTyping() {
  document.querySelector(".typing")?.classList.remove("show");
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, "user");
  input.value = "";
  sendBtn.disabled = true;
  input.style.height = "auto";

  showTyping();

  try {
    const res = await fetch(
      "http://127.0.0.1:8000/chat?message=" + encodeURIComponent(text),
      { method: "POST" }
    );

    if (!res.ok) throw new Error();
    const data = await res.json();

    hideTyping();
    addMessage(data.reply, "bot", data.emotion || "");

  } catch {
    hideTyping();
    addMessage("Server error. Is backend running?", "bot");
  }

  input.focus();
  scrollToBottom();
}

input.addEventListener("input", () => {
  sendBtn.disabled = input.value.trim() === "";
  input.style.height = "auto";
  input.style.height = input.scrollHeight + "px";
});

input.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    if (!sendBtn.disabled) sendMessage();
  }
});

sendBtn.addEventListener("click", sendMessage);

setTimeout(() => scrollToBottom(), 100);
input.focus();
</script>

</body>
</html>
